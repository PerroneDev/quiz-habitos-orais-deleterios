<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Hábitos Orais Deletérios</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <!-- Tela Inicial -->
        <div id="start-screen" class="screen active">
            <h1>Hábitos Orais Deletérios</h1>
            <p>Teste seus conhecimentos e concorra a uma prenda!</p>
            <button id="start-btn" class="primary-btn">Começar Quiz</button>
        </div>

        <!-- Tela do Quiz -->
        <div id="quiz-screen" class="screen">
            <div class="header">
                <div class="progress-text"><span id="current-question-num">1</span>/10</div>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>
            
            <div class="question-container">
                <h2 id="question-text">Pergunta vai aqui</h2>
                <div id="options-container" class="options-container">
                    <!-- Opções injetadas via JavaScript -->
                </div>
            </div>
            
            <div class="footer">
                <button id="next-btn" class="primary-btn" disabled>Próxima Pergunta</button>
            </div>
        </div>

        <!-- Tela de Resultado -->
        <div id="result-screen" class="screen">
            <div class="result-card">
                <h2 id="result-title">Resultado</h2>
                <div class="score-circle">
                    <span id="score-text">0/10</span>
                </div>
                <p id="result-message">Mensagem de resultado...</p>
                <button id="restart-btn" class="primary-btn">Refazer o Quiz</button>
            </div>
        </div>
    </div>
    <script src="script.js?v=4"></script>
</body>
</html>
